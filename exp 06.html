<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>JavaScript Events Demo</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: white;
            padding: 30px;
        }

        .container{
            width: 500px;
            margin: auto;
            background-color: #f2f2f2;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

        #paragraph{
            margin-top: 20px;
            font-size: 18px;
        }

    </style>

</head>

<body>

    <div class="container">

    
        <h1 id="heading">
            Welcome to JavaScript Events
        </h1>

    
        <input type="text"
               id="message"
               placeholder="Enter a message">

    
        <br>

        <button onclick="changeHeading()">
            Change Heading
        </button>

        <button onclick="changeBackground()">
            Change Background
        </button>

        <button onclick="changeFontSize()">
            Change Font Size
        </button>

        <button onclick="toggleParagraph()">
            Show/Hide Paragraph
        </button>

        <button onclick="resetPage()">
            Reset Page
        </button>

        
        <p id="paragraph">
            This paragraph can be hidden or shown.
        </p>

    </div>

    <script>


        function changeHeading()
        {
            let text =
            document.getElementById("message").value;

            document.getElementById("heading").innerHTML =
            text;
        }

        
        function changeBackground()
        {
            document.body.style.backgroundColor =
            "lightblue";
        }

        
        function changeFontSize()
        {
            document.getElementById("paragraph")
            .style.fontSize = "28px";
        }

        
        function toggleParagraph()
        {
            let para =
            document.getElementById("paragraph");

            if(para.style.display == "none")
            {
                para.style.display = "block";
            }

            else
            {
                para.style.display = "none";
            }
        }

        
        function resetPage()
        {
            location.reload();
        }

        document.getElementById("heading")
        .onmouseover = function()
        {
            this.style.color = "red";
        }

        
        document.getElementById("message")
        .onchange = function()
        {
            alert("Input Changed");
        }


        document.getElementById("paragraph")
        .addEventListener("mouseover", function()
        {
            this.style.color = "green";
        });

    </script>

</body>
</html>
