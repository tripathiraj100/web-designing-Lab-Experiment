<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Management System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container{
            width: 500px;
            margin: 30px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button{
            padding: 10px;
            margin: 5px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

        #output{
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }

        .employee-card{
            background-color: #e8f0fe;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Employee Management System</h2>


        <input type="text"
               id="name"
               placeholder="Enter Employee Name">

        <input type="text"
               id="id"
               placeholder="Enter Employee ID">

        <input type="number"
               id="salary"
               placeholder="Enter Salary">

        <input type="text"
               id="department"
               placeholder="Enter Department">

    
        <button onclick="addEmployee()">
            Add Employee
        </button>

        <button onclick="displayEmployees()">
            Display Employees
        </button>

        <button onclick="filterSalary()">
            Salary > 50000
        </button>

        <button onclick="totalSalary()">
            Total Salary
        </button>

        <button onclick="averageSalary()">
            Average Salary
        </button>

        <button onclick="countDepartment()">
            Count Department
        </button>

        
        <div id="output"></div>

    </div>

    <script>

        
        let employees = [];

    
        function addEmployee()
        {
            let empName =
            document.getElementById("name").value;

            let empId =
            document.getElementById("id").value;

            let empSalary =
            Number(document.getElementById("salary").value);

            let empDepartment =
            document.getElementById("department").value;

    
            let employee = {

                name: empName,
                id: empId,
                salary: empSalary,
                department: empDepartment

            };

        
            employees.push(employee);

            alert("Employee Added Successfully");
        }

    
        function displayEmployees()
        {
            let result = "";

            for(let i = 0; i < employees.length; i++)
            {
                result +=
                `
                <div class="employee-card">

                    <h3>${employees[i].name}</h3>

                    <p>ID: ${employees[i].id}</p>

                    <p>Salary: ₹${employees[i].salary}</p>

                    <p>Department:
                    ${employees[i].department}</p>

                </div>
                `;
            }

            document.getElementById("output").innerHTML = result;
        }

        function filterSalary()
        {
            let result = "";

            for(let i = 0; i < employees.length; i++)
            {
                if(employees[i].salary > 50000)
                {
                    result +=
                    `
                    <div class="employee-card">

                        <h3>${employees[i].name}</h3>

                        <p>Salary:
                        ₹${employees[i].salary}</p>

                    </div>
                    `;
                }
            }

            document.getElementById("output").innerHTML = result;
        }


        function totalSalary()
        {
            let total = 0;

            for(let i = 0; i < employees.length; i++)
            {
                total += employees[i].salary;
            }

            document.getElementById("output").innerHTML =
            `
            <h3>Total Salary Payout:
            ₹${total}</h3>
            `;
        }


        function averageSalary()
        {
            let total = 0;

            for(let i = 0; i < employees.length; i++)
            {
                total += employees[i].salary;
            }

            let average = total / employees.length;

            document.getElementById("output").innerHTML =
            `
            <h3>Average Salary:
            ₹${average.toFixed(2)}</h3>
            `;
        }

    
        function countDepartment()
        {
            let dept =
            prompt("Enter Department Name");

            let count = 0;

            for(let i = 0; i < employees.length; i++)
            {
                if(employees[i].department.toLowerCase()
                   == dept.toLowerCase())
                {
                    count++;
                }
            }

            document.getElementById("output").innerHTML =
            `
            <h3>
            Employees in ${dept} Department:
            ${count}
            </h3>
            `;
        }

    </script>

</body>
</html>
